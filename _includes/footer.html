<footer class="site-footer">
  <div class="container">
    <div class="footer-content">
      <p>&copy; {{ 'now' | date: '%Y' }} Nadav Ben Nun</p>
      <div class="footer-links">
        {% if site.email %}<a href="mailto:{{ site.email }}">Email</a>{% endif %}
        {% if site.google_scholar %}<a href="https://scholar.google.com/citations?user={{ site.google_scholar }}" target="_blank">Google Scholar</a>{% endif %}
        {% if site.github %}<a href="https://github.com/{{ site.github }}" target="_blank">GitHub</a>{% endif %}
      </div>
    </div>
  </div>
</footer>
